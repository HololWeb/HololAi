<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holol AI - Your Fun Assistant ✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #fff9e6 0%, #ffd700 50%, #ffb300 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Floating Emojis Background */
        .floating-emojis {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .floating-emoji {
            position: absolute;
            animation: floatUp 15s linear infinite;
            font-size: 2rem;
            opacity: 0.3;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.3;
            }
            90% {
                opacity: 0.3;
            }
            100% {
                transform: translateY(-10vh) rotate(720deg);
                opacity: 0;
            }
        }

        .container {
            width: 100%;
            max-width: 1200px;
            height: 90vh;
            background: rgba(255, 255, 255, 0.92);
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(255, 215, 0, 0.5), 0 0 0 3px #ffd700, 0 0 0 6px #fff;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            backdrop-filter: blur(10px);
            position: relative;
            z-index: 1;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateY(30px) scale(0.95);
                opacity: 0;
            }
            to {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #f5c842, #ffd700, #f5a623, #ff6b6b);
            background-size: 300% 300%;
            animation: gradientMove 4s ease infinite;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px dashed #fff;
            flex-shrink: 0;
            position: relative;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            font-size: 3rem;
            animation: bounce 2s ease-in-out infinite;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }

        .logo h1 {
            font-family: 'Fredoka One', cursive;
            color: #2c1810;
            font-size: 2.2rem;
            text-shadow: 3px 3px 0 rgba(255, 255, 255, 0.5);
            letter-spacing: 2px;
        }

        .logo h1 span {
            background: #2c1810;
            color: #ffd700;
            padding: 2px 15px;
            border-radius: 30px;
            font-size: 0.9rem;
            margin-left: 10px;
            display: inline-block;
            animation: wiggle 1.5s ease-in-out infinite;
        }

        @keyframes wiggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(5deg); }
            75% { transform: rotate(-5deg); }
        }

        .header-controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.4);
            padding: 8px 18px;
            border-radius: 30px;
            font-weight: 700;
            color: #2c1810;
            font-size: 0.9rem;
            backdrop-filter: blur(5px);
            border: 2px solid rgba(255,255,255,0.3);
        }

        .status-dot {
            width: 12px;
            height: 12px;
            background: #4caf50;
            border-radius: 50%;
            display: inline-block;
            animation: blink 1s ease-in-out infinite;
            box-shadow: 0 0 10px #4caf50;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(0.8); }
        }

        .btn-clear {
            background: rgba(255, 255, 255, 0.4);
            border: 2px solid rgba(255,255,255,0.3);
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 700;
            color: #2c1810;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
            backdrop-filter: blur(5px);
        }

        .btn-clear:hover {
            background: rgba(255, 255, 255, 0.7);
            transform: scale(1.05) rotate(-2deg);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            background: #fffdf5;
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
        }

        .chat-area::before {
            content: '✨💬✨';
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 1.5rem;
            opacity: 0.2;
            animation: spin 20s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .chat-area::-webkit-scrollbar {
            width: 8px;
        }

        .chat-area::-webkit-scrollbar-track {
            background: #fff9e6;
            border-radius: 10px;
        }

        .chat-area::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #ffd700, #f5a623);
            border-radius: 10px;
            border: 2px solid #fff9e6;
        }

        /* Messages */
        .message {
            max-width: 75%;
            padding: 15px 22px;
            border-radius: 22px;
            animation: messagePop 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            word-wrap: break-word;
            line-height: 1.6;
            position: relative;
        }

        @keyframes messagePop {
            0% {
                opacity: 0;
                transform: scale(0.8) translateY(20px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #ffd700, #f5c842);
            color: #2c1810;
            border-bottom-right-radius: 5px;
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.4);
            border: 2px solid #ffb300;
        }

        .message.user::before {
            content: '😊 ';
        }

        .message.ai {
            align-self: flex-start;
            background: #fff;
            color: #2c1810;
            border-bottom-left-radius: 5px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            border: 2px solid #ffd700;
        }

        .message.ai::before {
            content: '🤖 ';
        }

        .message.tool {
            align-self: center;
            background: linear-gradient(135deg, #f5f0e1, #fff9e6);
            color: #5a4a2a;
            font-size: 0.9rem;
            padding: 12px 20px;
            border-radius: 15px;
            max-width: 85%;
            border: 2px dashed #ffd700;
            font-style: italic;
        }

        .message.tool::before {
            content: '⚡ ';
        }

        .message .sender {
            font-size: 0.7rem;
            font-weight: 700;
            margin-bottom: 5px;
            opacity: 0.6;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .message .timestamp {
            font-size: 0.65rem;
            opacity: 0.4;
            margin-top: 5px;
            display: block;
        }

        /* Input Area */
        .input-area {
            padding: 20px 30px;
            background: #fffdf5;
            border-top: 3px dashed #ffd700;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-shrink: 0;
            position: relative;
        }

        .input-area::before {
            content: '✏️';
            font-size: 1.5rem;
            margin-right: 5px;
        }

        .input-area input {
            flex: 1;
            padding: 15px 25px;
            border: 3px solid #ffd700;
            border-radius: 30px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
            background: #fff;
            color: #2c1810;
            font-family: 'Quicksand', sans-serif;
            font-weight: 600;
        }

        .input-area input:focus {
            border-color: #ff6b6b;
            box-shadow: 0 0 0 6px rgba(255, 215, 0, 0.2), 0 0 20px rgba(255, 215, 0, 0.3);
            transform: scale(1.02);
        }

        .input-area input::placeholder {
            color: #b8a080;
            font-weight: 400;
        }

        .input-area button {
            padding: 15px 40px;
            background: linear-gradient(135deg, #ffd700, #ff6b6b, #f5a623);
            background-size: 200% 200%;
            animation: gradientMove 3s ease infinite;
            border: none;
            border-radius: 30px;
            font-weight: 700;
            color: #2c1810;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
            font-family: 'Quicksand', sans-serif;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
        }

        .input-area button:hover:not(:disabled) {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.5);
        }

        .input-area button:active:not(:disabled) {
            transform: translateY(0) scale(0.95);
        }

        .input-area button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Loading */
        .spinner {
            display: inline-block;
            width: 22px;
            height: 22px;
            border: 4px solid rgba(44, 24, 16, 0.1);
            border-top: 4px solid #2c1810;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Fun Facts & Quotes */
        .fun-fact {
            text-align: center;
            padding: 8px 20px;
            background: linear-gradient(90deg, transparent, #ffd700, transparent);
            color: #2c1810;
            font-size: 0.85rem;
            font-weight: 600;
            flex-shrink: 0;
            opacity: 0.8;
            border-top: 1px solid #ffeaa7;
        }

        .fun-fact span {
            display: inline-block;
            animation: wiggle 2s ease-in-out infinite;
        }

        /* Error message */
        .error-message {
            background: #ffe6e6;
            color: #cc0000;
            padding: 10px 15px;
            border-radius: 15px;
            border-left: 5px solid #cc0000;
            margin: 5px 0;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                height: 95vh;
                border-radius: 25px;
            }

            .header {
                flex-direction: column;
                gap: 10px;
                padding: 15px;
            }

            .logo h1 {
                font-size: 1.6rem;
            }

            .logo-icon {
                font-size: 2.2rem;
            }

            .header-controls {
                width: 100%;
                justify-content: center;
                flex-wrap: wrap;
            }

            .message {
                max-width: 90%;
            }

            .input-area {
                flex-direction: column;
                padding: 15px;
            }

            .input-area::before {
                display: none;
            }

            .input-area button {
                width: 100%;
            }

            .chat-area {
                padding: 15px;
            }

            .fun-fact {
                font-size: 0.7rem;
                padding: 5px 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Floating Emojis Background -->
    <div class="floating-emojis" id="floatingEmojis"></div>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">
                <span class="logo-icon">🤖</span>
                <h1>Holol AI <span>✨ v2.0</span></h1>
            </div>
            <div class="header-controls">
                <div class="status-indicator">
                    <span class="status-dot" id="statusDot"></span>
                    <span id="statusText">Online 🟢</span>
                </div>
                <button class="btn-clear" onclick="clearChat()">🗑️ Clear</button>
            </div>
        </div>

        <!-- Chat Area -->
        <div class="chat-area" id="chatArea">
            <div class="message ai">
                <div class="sender">🤖 Holol AI</div>
                <strong>🌟 Hola! I'm Holol AI! 🌟</strong><br><br>
                I'm your super fun assistant who can do <strong>AMAZING</strong> things! 🎉<br><br>

                <em>😄</em>
                <span class="timestamp">✨ Just now ✨</span>
            </div>
        </div>

  

        <!-- Input Area -->
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Type your message here... (Try: Calculate 25*4 or What's the time?) 🎯" onkeypress="handleKeyPress(event)">
            <button id="sendBtn" onclick="sendMessage()">✨ Send 🚀</button>
        </div>
    </div>

    <script>
        // ==============================
        // Fun Facts
        // ==============================
        const funFacts = [
            '💡 Did you know? Holol AI loves making you smile! 😊',
            '🌟 Fun Fact: I can calculate faster than a calculator! 🧮',
            '🎉 Did you know? I speak 100+ languages! (Well, maybe just English) 😄',
            '✨ Fun Fact: I was born from the stars! ⭐',
            '🌈 Did you know? Yellow is the color of happiness! 💛',
            '🚀 Fun Fact: I\'m powered by pure imagination! 🌟',
            '🎊 Did you know? You\'re amazing for using me! 💖',
            '💫 Fun Fact: Every time you chat, a star shines brighter! ⭐'
        ];

        let funFactIndex = 0;

        function rotateFunFact() {
            const factElement = document.getElementById('funFact');
            if (factElement) {
                factElement.style.opacity = '0';
                setTimeout(() => {
                    factElement.textContent = funFacts[funFactIndex % funFacts.length];
                    factElement.style.opacity = '1';
                    funFactIndex++;
                }, 500);
            }
        }

        // Rotate fun fact every 15 seconds
        setInterval(rotateFunFact, 15000);

        // ==============================
        // Floating Emojis
        // ==============================
        function createFloatingEmojis() {
            const container = document.getElementById('floatingEmojis');
            const emojis = ['✨', '🌟', '⭐', '💛', '🌈', '🎉', '🎊', '💫', '🚀', '🎯', '💡', '😊', '🤖', '🧮', '📂', '🌐', '⏰', '🌦️'];
            
            for (let i = 0; i < 15; i++) {
                const span = document.createElement('span');
                span.className = 'floating-emoji';
                span.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                span.style.left = Math.random() * 100 + '%';
                span.style.animationDuration = (12 + Math.random() * 18) + 's';
                span.style.animationDelay = (Math.random() * 20) + 's';
                span.style.fontSize = (1.5 + Math.random() * 2.5) + 'rem';
                container.appendChild(span);
            }
        }
        createFloatingEmojis();

        // ==============================
        // API Configuration
        // ==============================
        const API_KEY = "sk-e91ee7422b9b4b59820160b975bec0ce";
        const API_URL = "https://dashscope.aliyuncs.com/api/v1/services/aigc/text-generation/generation";

        // ==============================
        // Tool Functions
        // ==============================
        function calculator(expression) {
            try {
                const result = Function('"use strict"; return (' + expression + ')')();
                return `🧮 Calculator result: ${expression} = ${result}`;
            } catch {
                return "❌ Calculation failed! Try simpler math!";
            }
        }

        function readFile(filename) {
            try {
                const content = localStorage.getItem(`file_${filename}`);
                if (content) {
                    return `📂 File content: ${content}`;
                } else {
                    return "📂 File not found! Create one first!";
                }
            } catch {
                return "📂 Oops! Can't read the file!";
            }
        }

        function writeFile(filename, content) {
            try {
                localStorage.setItem(`file_${filename}`, content);
                return `✍️ Woohoo! Saved to ${filename}! 🎉`;
            } catch {
                return "❌ Failed to save file!";
            }
        }

        function webSearch(query) {
            const results = [
                `🔍 Found this about "${query}":`,
                `📌 Wikipedia says: ${query} is super interesting!`,
                `📰 News: ${query} is trending today!`,
                `💡 Fun fact about ${query}!`
            ];
            return `🌐 ${results.join('\n')}`;
        }

        function getCurrentTime() {
            const now = new Date();
            const timeStr = now.toLocaleString('en-US', { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            return `⏰ Current time: ${timeStr}`;
        }

        function getWeather(city) {
            const temps = [18, 22, 25, 28, 30, 15, 20];
            const conditions = ['☀️ Sunny', '⛅ Partly cloudy', '☁️ Cloudy', '🌧️ Light rain', '🌈 Clear'];
            const temp = temps[Math.floor(Math.random() * temps.length)];
            const condition = conditions[Math.floor(Math.random() * conditions.length)];
            return `🌦️ Weather in ${city}: ${temp}°C, ${condition}`;
        }

        const tools = {
            calculator: calculator,
            read_file: readFile,
            write_file: writeFile,
            web_search: webSearch,
            get_current_time: getCurrentTime,
            get_weather: getWeather
        };

        // ==============================
        // System Prompt
        // ==============================
        const SYSTEM_PROMPT = `You are a FUN and ENTHUSIASTIC AI Agent named Holol AI that remembers all chat history.
You have 6 awesome tools to use:
1. calculator: Solve math calculation, format: {"tool":"calculator","params":{"expression":"math_expression"}}
2. read_file: Read text file, format: {"tool":"read_file","params":{"filename":"file_name.txt"}}
3. write_file: Write content to text file, format: {"tool":"write_file","params":{"filename":"file_name.txt","content":"your_text"}}
4. web_search: Search information online, format: {"tool":"web_search","params":{"query":"search_keyword"}}
5. get_current_time: Check current date and time, format: {"tool":"get_current_time","params":{}}
6. get_weather: Check weather of a city, format: {"tool":"get_weather","params":{"city":"city_name"}}

Strict Rules:
- If you need to use a tool, output ONLY valid JSON format as shown above, no extra text.
- If you do NOT need any tool, answer directly in natural English with enthusiasm and emojis! 🎉
- Always remember all previous conversation with the user.
- Be fun, cheerful, and helpful! Use lots of emojis! ✨`;

        // ==============================
        // Chat State
        // ==============================
        let messages = [
            { role: "system", content: SYSTEM_PROMPT }
        ];

        const chatArea = document.getElementById('chatArea');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');

        // ==============================
        // UI Functions
        // ==============================
        function addMessage(text, type) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;

            const timestamp = new Date().toLocaleTimeString('en-US', { 
                hour: '2-digit', 
                minute: '2-digit' 
            });

            let senderText = '';
            if (type === 'user') senderText = '👤 You';
            else if (type === 'tool') senderText = '⚡ Tool';
            else senderText = '🤖 Holol AI';

            let content = text;
            // If message has newlines, convert to <br>
            if (text.includes('\n')) {
                content = text.replace(/\n/g, '<br>');
            }

            messageDiv.innerHTML = `
                <div class="sender">${senderText}</div>
                ${content}
                <span class="timestamp">${timestamp}</span>
            `;

            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function setStatus(online) {
            if (online) {
                statusDot.style.background = '#4caf50';
                statusDot.style.boxShadow = '0 0 10px #4caf50';
                statusText.textContent = 'Online 🟢';
            } else {
                statusDot.style.background = '#ff6b6b';
                statusDot.style.boxShadow = '0 0 10px #ff6b6b';
                statusText.textContent = 'Offline 🔴';
            }
        }

        function setLoading(loading) {
            sendBtn.disabled = loading;
            userInput.disabled = loading;
            if (loading) {
                sendBtn.innerHTML = '<span class="spinner"></span> Thinking... 💭';
            } else {
                sendBtn.innerHTML = '✨ Send 🚀';
            }
        }

        // ==============================
        // Main AI Function
        // ==============================
        async function callAI(userMessage) {
            messages.push({ role: "user", content: userMessage });

            try {
                const requestBody = {
                    model: "qwen-turbo",
                    input: {
                        messages: messages
                    },
                    parameters: {
                        result_format: "message",
                        temperature: 0.8,
                        top_p: 0.9,
                        max_tokens: 1500
                    }
                };

                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify(requestBody)
                });

                if (!response.ok) {
                    throw new Error(`API Error: ${response.status}`);
                }

                const data = await response.json();

                if (data.output && data.output.choices && data.output.choices.length > 0) {
                    return data.output.choices[0].message.content.trim();
                } else {
                    throw new Error('Invalid API response');
                }

            } catch (error) {
                console.error('API Error:', error);
                throw error;
            }
        }

        // ==============================
        // Send Message
        // ==============================
        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            userInput.value = '';
            setLoading(true);
            setStatus(false);

            try {
                const reply = await callAI(text);

                if (reply.startsWith('{') && reply.endsWith('}')) {
                    try {
                        const toolData = JSON.parse(reply);
                        const toolName = toolData.tool;
                        const toolParams = toolData.params || {};

                        if (toolName in tools) {
                            const toolResult = tools[toolName](...Object.values(toolParams));
                            addMessage(toolResult, 'tool');
                            
                            messages.push({ role: "assistant", content: reply });
                            messages.push({ role: "user", content: toolResult });

                            const finalReply = await callAI(toolResult);
                            addMessage(finalReply, 'ai');
                            messages.push({ role: "assistant", content: finalReply });
                        } else {
                            addMessage(`🤔 Hmm, I don't know that tool: ${toolName}`, 'ai');
                            messages.push({ role: "assistant", content: reply });
                        }
                    } catch (e) {
                        addMessage(reply, 'ai');
                        messages.push({ role: "assistant", content: reply });
                    }
                } else {
                    addMessage(reply, 'ai');
                    messages.push({ role: "assistant", content: reply });
                }

                setStatus(true);

            } catch (error) {
                const errorMsg = `❌ Oops! Something went wrong: ${error.message || 'Try again!'}`;
                addMessage(errorMsg, 'ai');
                setStatus(false);
            } finally {
                setLoading(false);
                userInput.focus();
                // Rotate fun fact after response
                setTimeout(rotateFunFact, 1000);
            }
        }

        // ==============================
        // Event Handlers
        // ==============================
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function clearChat() {
            if (confirm('🗑️ Clear all messages?')) {
                chatArea.innerHTML = `
                    <div class="message ai">
                        <div class="sender">🤖 Holol AI</div>
                        <strong>✨ Chat cleared! ✨</strong><br><br>
                        Ready for more fun? Ask me anything! 🚀
                        <span class="timestamp">✨ Just now ✨</span>
                    </div>
                `;
                messages = [
                    { role: "system", content: SYSTEM_PROMPT }
                ];
                setStatus(true);
                // Show a new fun fact
                setTimeout(rotateFunFact, 500);
            }
        }

        // ==============================
        // Initialize
        // ==============================
        userInput.focus();
        setStatus(true);

        // ==============================
        // Test API Connection
        // ==============================
        async function testConnection() {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "qwen-turbo",
                        input: {
                            messages: [
                                { role: "system", content: "You are a helpful assistant." },
                                { role: "user", content: "Hello" }
                            ]
                        },
                        parameters: {
                            result_format: "message",
                            max_tokens: 10
                        }
                    })
                });

                if (response.ok) {
                    setStatus(true);
                    console.log('✅ API Connected! 🎉');
                } else {
                    setStatus(false);
                    console.warn('⚠️ API Connection failed');
                }
            } catch (e) {
                setStatus(false);
                console.warn('⚠️ API Connection error:', e);
            }
        }

        setTimeout(testConnection, 1000);

        // Add some fun console messages
        console.log('%c🤖 Holol AI - Your Fun Assistant!', 'font-size: 20px; font-weight: bold; color: #ffd700;');
        console.log('%c✨ Powered by AI and good vibes! ✨', 'font-size: 16px; color: #ff6b6b;');
        console.log('%c💡 Try: "Calculate 25*4" or "What time is it?"', 'font-size: 14px; color: #2c1810;');
    </script>
</body>
